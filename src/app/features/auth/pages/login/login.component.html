<main id="contenido-principal" class="login-page">
  @if (loading()) {
    <app-loader [overlay]="true" message="Ingresando..." color="#FFAA49" />
  }

  @if (toast.state(); as t) {
    <div class="tg-alert-stack" aria-live="polite">
      <app-tailgrids-alert
        [variant]="t.variant"
        [title]="t.title"
        [message]="t.message"
        (closed)="toast.dismiss()"
      />
    </div>
  }

  <div class="login-page__backdrop" aria-hidden="true">
    <span class="login-page__orb login-page__orb--1"></span>
    <span class="login-page__orb login-page__orb--2"></span>
    <span class="login-page__orb login-page__orb--3"></span>
  </div>

  <div class="login-card-wrapper">
    <div class="login-card rgfm-fade-in-up">
    <div class="login-brand">
      <div class="brand-icon">
        <img src="favicon.svg" width="48" height="48" alt="Comisiones RGFM" />
      </div>
      <h1>Reportes</h1>
    </div>

    <form (ngSubmit)="submit()" autocomplete="off">
      <div class="mb-3">
        <label class="form-label" for="username">Usuario o correo</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person" aria-hidden="true"></i></span>
          <input
            id="username"
            type="text"
            class="form-control"
            [(ngModel)]="username"
            name="username"
            required
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock" aria-hidden="true"></i></span>
          <input
            id="password"
            type="password"
            class="form-control"
            [(ngModel)]="password"
            name="password"
            required
            autocomplete="new-password"
          />
        </div>
      </div>

      <div class="login-submit-row">
        <button type="submit" class="btn btn-rgfm-primary login-submit" [disabled]="loading()">
          @if (loading()) {
            Ingresando...
          } @else {
            <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
            Ingresar
          }
        </button>
      </div>
    </form>
    </div>
  </div>
</main>
