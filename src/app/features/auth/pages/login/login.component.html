<main id="contenido-principal" class="login-page">
  @if (loading()) {
    <app-loader [overlay]="true" overlayScope="viewport" message="Ingresando..." color="#FFAA49" />
  }

  @if (toast.state(); as t) {
    <div class="tg-alert-stack" aria-live="polite">
      <app-tailgrids-alert
        [variant]="t.variant"
        [title]="t.title"
        [message]="t.message"
        (closed)="toast.dismiss()"
      />
    </div>
  }

  <div class="login-page__backdrop" aria-hidden="true">
    <span class="login-page__orb login-page__orb--1"></span>
    <span class="login-page__orb login-page__orb--2"></span>
    <span class="login-page__orb login-page__orb--3"></span>
  </div>

  <div class="login-card-wrapper">
    <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">
        <img src="favicon.svg" width="48" height="48" alt="HopData" />
      </div>
      <h1>HopData</h1>
    </div>

    <form (ngSubmit)="submit()" autocomplete="off">
      <div class="rgfm-field mb-3">
        <label class="rgfm-field__label" for="username">Usuario</label>
        <div class="input-group">
          <span class="input-group-text">
            <svg class="login-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4 1 1 1 1z"/>
            </svg>
          </span>
          <input
            id="username"
            type="text"
            class="form-control"
            [(ngModel)]="username"
            name="username"
            placeholder="Ingrese su usuario"
            required
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          />
        </div>
      </div>

      <div class="rgfm-field mb-4">
        <label class="rgfm-field__label" for="password">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text">
            <svg class="login-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2"/>
            </svg>
          </span>
          <input
            id="password"
            type="password"
            class="form-control"
            [(ngModel)]="password"
            name="password"
            placeholder="Ingrese su contraseña"
            required
            autocomplete="new-password"
          />
        </div>
      </div>

      <div class="login-submit-row">
        <button type="submit" class="btn btn-rgfm-primary login-submit" [disabled]="loading()">
          @if (loading()) {
            Ingresando...
          } @else {
            <svg class="login-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M6 3.5a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-2a.5.5 0 0 0-1 0v2A1.5 1.5 0 0 0 6.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-8A1.5 1.5 0 0 0 5 3.5v2a.5.5 0 0 0 1 0z"/>
              <path fill-rule="evenodd" d="M11.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.708.708L10.293 7.5H1.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
            </svg>
            Ingresar
          }
        </button>
      </div>
    </form>
    </div>
  </div>
</main>
