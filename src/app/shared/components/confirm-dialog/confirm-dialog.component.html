<dialog
  #dialogEl
  class="confirm-dialog"
  [class.confirm-dialog--open]="open()"
  [attr.aria-labelledby]="titleId"
  (cancel)="onCancel($event)"
  (click)="onBackdropClick($event)"
>
  <div class="confirm-dialog__backdrop" aria-hidden="true"></div>

  <div class="confirm-dialog__container" tabindex="-1">
    <div
      class="confirm-dialog__panel"
      [class.confirm-dialog--danger]="variant() === 'danger'"
      [class.confirm-dialog--warning]="variant() === 'warning'"
      [class.confirm-dialog--info]="variant() === 'info'"
      [class.confirm-dialog--primary]="variant() === 'primary'"
      (click)="$event.stopPropagation()"
    >
      <div class="confirm-dialog__body">
        <div class="confirm-dialog__content-row">
          <div class="confirm-dialog__icon-wrap" aria-hidden="true">
            @switch (variant()) {
              @case ('warning') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="confirm-dialog__icon">
                  <path
                    d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              }
              @case ('info') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="confirm-dialog__icon">
                  <path
                    d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              }
              @case ('primary') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="confirm-dialog__icon">
                  <path
                    d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              }
              @default {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="confirm-dialog__icon">
                  <path
                    d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              }
            }
          </div>

          <div class="confirm-dialog__text">
            <h2 [id]="titleId" class="confirm-dialog__title">{{ title() }}</h2>
            <p class="confirm-dialog__message">{{ message() }}</p>
          </div>
        </div>
      </div>

      <div class="confirm-dialog__footer">
        <button type="button" class="confirm-dialog__btn confirm-dialog__btn--confirm" (click)="onConfirm()">
          {{ confirmLabel() }}
        </button>
        <button type="button" class="confirm-dialog__btn confirm-dialog__btn--cancel" (click)="onCancel()">
          {{ cancelLabel() }}
        </button>
      </div>
    </div>
  </div>
</dialog>
