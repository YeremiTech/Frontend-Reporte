# Configuración de referencia para el Static Site en Render.
#
# OBLIGATORIO en Dashboard → Settings:
#   Publish directory: dist/comisiones-frontend/browser
#
# RECOMENDADO en Dashboard → Redirects/Rewrites (URLs sin #):
#   Source: /*  |  Destination: /index.html  |  Action: Rewrite
#   Luego en environment.ts poner useHashRouting: false
#
# Sin rewrite, el build usa useHashRouting: true (/#/graficos, /#/resumen).

services:
  - type: web
    name: frontend-reporte
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist/comisiones-frontend/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
